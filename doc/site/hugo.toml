baseURL = 'https://recoilengine.org/'
languageCode = 'en-us'
title = 'Recoil Engine'

minify.minifyOutput = true

refLinksErrorLevel = "WARNING"
defaultContentLanguageInSubdir = false  # 不加 /zh-cn/ 前缀，直接用根路径

[languages]
  [languages.en]
    languageCode = "en"
    languageName = "English"
    weight = 1
        [languages.en.menu]
            [[languages.en.menu.main]]
                identifier = "documentation"
                name = "Documentation"
                pageRef = "/docs"
                weight = 1

            [[languages.en.menu.main]]
                identifier = "api"
                name = "API Reference"
                pageRef = "/docs/lua-api"
                weight = 2

            [[languages.en.menu.main]]
                identifier = "articles"
                name = "Articles"
                pageRef = "/articles"
                weight = 3

            [[languages.en.menu.main]]
                identifier = "development"
                name = "Development"
                pageRef = "/development"
                weight = 4

            [[languages.en.menu.main]]
                identifier = "changelogs"
                name = "Changelogs"
                pageRef = "/changelogs"
                weight = 5

            [[languages.en.menu.main]]
                identifier = "search"
                name = "Search"
                params.type = "search"
                weight = 6

            [[languages.en.menu.main]]
                identifier = "github"
                name = "Github"
                params.icon = "github"
                url = "https://github.com/beyond-all-reason/RecoilEngine/"
                weight = 7

            [[languages.en.menu.main]]
                identifier = "discord"
                name = "Discord"
                params.icon = "discord"
                url = "https://discord.gg/GUpRg6Wz3e"
                weight = 8

            [[languages.en.menu.sidebar]]
                name = "More"
                weight = 1
                params.type = "separator"

            [[languages.en.menu.sidebar]]
                name = "Github ↗"
                url = "https://github.com/beyond-all-reason/RecoilEngine/"
                weight = 2

            [[languages.en.menu.sidebar]]
                name = "Discord ↗"
                url = "https://discord.gg/GUpRg6Wz3e"
                weight = 3
    
  [languages.zh-cn]
    languageCode = "zh-CN"
    languageName = "中文"
    weight = 2
        [languages.zh-cn.menu]
            [[languages.zh-cn.menu.main]]
                identifier = "documentation"
                name = "文档"
                pageRef = "/docs"
                weight = 1

            [[languages.zh-cn.menu.main]]
                identifier = "api"
                name = "API 参考"
                pageRef = "/docs/lua-api"
                weight = 2

            [[languages.zh-cn.menu.main]]
                identifier = "articles"
                name = "文章"
                pageRef = "/articles"
                weight = 3

            [[languages.zh-cn.menu.main]]
                identifier = "development"
                name = "开发"
                pageRef = "/development"
                weight = 4

            [[languages.zh-cn.menu.main]]
                identifier = "changelogs"
                name = "更新日志"
                pageRef = "/changelogs"
                weight = 5

            [[languages.zh-cn.menu.main]]
                identifier = "search"
                name = "搜索"
                params.type = "search"
                weight = 6

            [[languages.zh-cn.menu.main]]
                identifier = "github"
                name = "GitHub"
                params.icon = "github"
                url = "https://github.com/beyond-all-reason/RecoilEngine/"
                weight = 7

            [[languages.zh-cn.menu.main]]
                identifier = "discord"
                name = "Discord"
                params.icon = "discord"
                url = "https://discord.gg/GUpRg6Wz3e"
                weight = 8

# We don't want to error if LUA-API is not built for example
refLinksErrorLevel = "WARNING"

[params]
    repo = "https://github.com/beyond-all-reason/RecoilEngine/"

    [params.page]
        width = "full"

    [params.footer]
        enable = true
        displayCopyright = true
        displayuPoweredBy = true

    [params.search.flexsearch]
        index = "heading"

    [params.editUrl]
        enable = true
        base = "https://github.com/beyond-all-reason/RecoilEngine/edit/master/doc/site/content/"

    [params.navbar]
        displayTitle = false
        displayLogo = true

    [params.navbar.logo]
            path = "RecoilEngine_Logo_Light.svg"
            dark = "RecoilEngine_Logo_Dark.svg"
            width = 112

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[markup.goldmark.renderer]
    unsafe = true
    theme = "github.com/imfing/hextra"

[module]
    [[module.imports]]
    path = "github.com/imfing/hextra"

